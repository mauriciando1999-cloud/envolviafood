<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envolviafood | Delivery y Envíos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="app.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
    <script src="app.js" defer></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-gray-900 text-white flex flex-col hidden md:flex shadow-xl z-20 border-r border-gray-800 shrink-0">
        <div class="h-16 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-2xl font-bold tracking-widest uppercase">Envolvia<span class="text-blue-500">food</span></h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto" id="sidebarMenu">
            </nav>
        <div class="p-4 border-t border-gray-800 bg-gray-900">
            <div class="flex items-center">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold shadow-inner">RT</div>
                <div class="ml-3 truncate">
                    <p class="text-sm font-medium text-white truncate">Restaurante Test</p>
                    <a href="index.html" class="text-xs text-gray-400 hover:text-blue-400 transition">Configuración</a>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden" id="delivery-container">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0 shadow-sm z-10">
            <h2 class="text-lg font-bold text-gray-800 flex items-center">
                <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Gestión de Delivery
            </h2>
            <div class="flex items-center gap-4">
                <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition">
                    + Nuevo Pedido Manual
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-fit">
                <div class="p-4 border-b border-gray-100 bg-gray-50 rounded-t-xl flex justify-between items-center">
                    <h3 class="font-bold text-gray-800">Tarifas por Área / Distancia</h3>
                    <button class="text-blue-600 hover:text-blue-800 text-sm font-semibold">+ Añadir</button>
                </div>
                <div class="p-4">
                    <p class="text-xs text-gray-500 mb-4">Define el costo de envío según la zona de entrega del cliente.</p>
                    <ul class="space-y-3" id="zones-list">
                        </ul>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                
                <div class="flex gap-4">
                    <div class="flex-1 relative">
                        <svg class="w-5 h-5 absolute left-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" placeholder="Buscar por cliente, ID o dirección..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <select class="border border-gray-300 rounded-lg px-4 py-2 bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="all">Todos los estados</option>
                        <option value="pending">Preparando</option>
                        <option value="ready">Listo para despachar</option>
                        <option value="en_route">En Ruta</option>
                    </select>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead class="bg-gray-50 text-gray-600 font-semibold border-b border-gray-200">
                                <tr>
                                    <th class="px-6 py-4">ID / Cliente</th>
                                    <th class="px-6 py-4">Dirección y Zona</th>
                                    <th class="px-6 py-4">Cobranza Total</th>
                                    <th class="px-6 py-4 text-center">Estado</th>
                                    <th class="px-6 py-4 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100" id="delivery-orders-list">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>
</body>
</html>
