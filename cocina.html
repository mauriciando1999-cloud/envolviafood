<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envolviafood | KDS (Cocina)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="app.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Scrollbar personalizado */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 10px; }
        
        /* Animación para el asistente de voz */
        .listening-pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
    <script src="app.js" defer></script>
</head>
<body class="bg-gray-900 text-white flex h-screen overflow-hidden">

    <aside class="w-64 bg-gray-950 text-white flex flex-col hidden md:flex shadow-2xl z-20 border-r border-gray-800">
        <div class="h-16 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-2xl font-bold tracking-widest uppercase">Envolvia<span class="text-blue-500">food</span></h1>
        </div>

        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto" id="sidebarMenu">
            <a href="dashboard.html" class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition-colors">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Resumen General
            </a>
            
            <div class="pt-4 pb-2">
                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider px-4">Tus Módulos</p>
            </div>
            </nav>

        <div class="p-4 border-t border-gray-800 bg-gray-950">
            <div class="flex items-center">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold">RT</div>
                <div class="ml-3 truncate">
                    <p class="text-sm font-medium text-white truncate">Restaurante Test</p>
                    <a href="index.html" class="text-xs text-gray-400 hover:text-blue-400 transition">Configuración</a>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 bg-gray-900 border-b border-gray-800 flex items-center justify-between px-6 shrink-0 shadow-sm z-10">
            <div class="flex items-center gap-4">
                <h2 class="text-lg font-semibold text-gray-300">Monitor KDS</h2>
                <span class="px-3 py-1 bg-gray-800 rounded-full text-xs font-semibold text-gray-400 border border-gray-700" id="clock">00:00:00</span>
            </div>
            
            <div class="flex items-center gap-4">
                <p id="voice-status" class="text-sm text-gray-400">Asistente inactivo</p>
                <button id="btn-mic" class="bg-gray-800 hover:bg-gray-700 text-white p-2.5 rounded-full transition relative border border-gray-700" title="Activar/Desactivar Asistente">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                </button>
            </div>
        </header>

        <div class="flex-1 overflow-x-auto p-6 bg-gray-900/50">
            <div id="orders-container" class="flex gap-6 h-full items-start">
                </div>
        </div>
    </main>

</body>
</html>
