<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Envolviafood | Ruleta de la Cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        
        /* Contenedor de la ruleta con transición fluida para el giro */
        #wheel-container {
            transition: transform 4s cubic-bezier(0.175, 0.885, 0.32, 1);
            transform-origin: center center;
        }

        /* Animación para el botón de girar */
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .btn-spin {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body class="bg-gray-950 h-screen flex flex-col overflow-hidden text-white selection:bg-transparent">

    <div class="w-full max-w-md mx-auto bg-gray-900 h-full flex flex-col relative shadow-2xl border-x border-gray-800">
        
        <header class="p-4 flex justify-between items-center z-20 bg-gray-950/80 backdrop-blur-md border-b border-gray-800">
            <a href="qr_mesa.html" class="text-gray-400 hover:text-white transition p-2 rounded-full hover:bg-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <div class="flex flex-col items-center">
                <h1 class="text-xl font-black tracking-widest text-purple-400 uppercase">La Ruleta</h1>
                <span class="text-[10px] text-gray-400 font-semibold tracking-widest">¿Quién paga hoy?</span>
            </div>
            <div class="text-xs font-bold text-gray-900 bg-purple-400 px-3 py-1 rounded-full shadow-[0_0_10px_rgba(192,132,252,0.5)]">
                Mesa 4
            </div>
        </header>

        <main class="flex-1 relative flex flex-col items-center justify-center p-6 overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gray-800 to-gray-950">
            
            <div class="absolute top-[15%] z-30 flex flex-col items-center drop-shadow-2xl filter">
                <div class="bg-white px-4 py-1 rounded-full text-gray-900 font-black text-xs uppercase tracking-widest shadow-lg border-2 border-gray-200 mb-1">
                    Ganador (o Perdedor)
                </div>
                <svg class="w-10 h-10 text-white fill-current drop-shadow-md" viewBox="0 0 24 24">
                    <path d="M12 21l-9-13h18z" />
                </svg>
            </div>

            <div class="relative w-full max-w-[320px] aspect-square drop-shadow-[0_0_40px_rgba(0,0,0,0.8)] mt-8">
                <div class="absolute inset-0 bg-gray-900 rounded-full border-[8px] border-gray-800 shadow-inner"></div>
                
                <svg id="wheel-container" class="w-full h-full relative z-10" viewBox="-100 -100 200 200">
                    </svg>

                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-gray-800 border-4 border-gray-600 rounded-full z-20 shadow-[0_0_15px_rgba(0,0,0,0.5)] flex items-center justify-center">
                    <div class="w-4 h-4 bg-gray-500 rounded-full shadow-inner"></div>
                </div>
            </div>

        </main>

        <footer class="p-8 bg-gray-900 border-t border-gray-800 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] relative z-30">
            <button id="btn-spin" onclick="spinWheel()" class="w-full btn-spin bg-red-600 hover:bg-red-500 text-white font-black italic text-2xl tracking-widest py-5 rounded-2xl shadow-[0_0_20px_rgba(239,68,68,0.4)] active:scale-95 transition-transform flex flex-col items-center justify-center border-b-4 border-red-800 uppercase">
                Girar Ruleta
            </button>
            <p class="text-center text-xs text-gray-500 mt-4 font-semibold uppercase tracking-widest">
                Sin devoluciones. La ruleta es ley.
            </p>
        </footer>

        <div id="result-modal" class="absolute inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-6">
            <div class="bg-gray-900 border border-gray-700 rounded-3xl p-8 w-full text-center shadow-2xl transform scale-90 transition-transform duration-300" id="result-content">
                <span class="text-5xl mb-4 block">💸</span>
                <h2 class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-1">Y la cuenta la paga...</h2>
                <h3 id="loser-name" class="text-4xl font-black text-white mb-6 uppercase italic">Nombre</h3>
                <button onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition">
                    Aceptar el destino
                </button>
            </div>
        </div>
    </div>

    <script>
        // Los participantes de la mesa (simulados para el MVP)
        const players = ["Mauricio", "Angi", "Compañero 1", "Compañero 2"];
        
        // Paleta de colores vibrantes para los gajos
        const colors = ["#ef4444", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899"];

        const wheelContainer = document.getElementById('wheel-container');
        const btnSpin = document.getElementById('btn-spin');
        
        let currentRotation = 0;
        let isSpinning = false;

        // Función matemática para trazar los gajos del SVG
        function getCoordinatesForPercent(percent) {
            const x = Math.cos(2 * Math.PI * percent) * 100;
            const y = Math.sin(2 * Math.PI * percent) * 100;
            return [x, y];
        }

        // Generar la ruleta visualmente
        function drawWheel() {
            wheelContainer.innerHTML = '';
            const sliceAngle = 1 / players.length;
            let cumulativePercent = 0; // Desfase inicial para centrar el primer gajo

            players.forEach((player, index) => {
                const [startX, startY] = getCoordinatesForPercent(cumulativePercent);
                cumulativePercent += sliceAngle;
                const [endX, endY] = getCoordinatesForPercent(cumulativePercent);

                // Determinar si el arco es mayor a 180 grados (no debería pasar con >2 jugadores)
                const largeArcFlag = sliceAngle > 0.5 ? 1 : 0;

                // Crear el path (el gajo)
                const pathData = [
                    `M ${startX} ${startY}`, // Mover al inicio del arco
                    `A 100 100 0 ${largeArcFlag} 1 ${endX} ${endY}`, // Dibujar el arco
                    `L 0 0`, // Línea al centro
                    `Z` // Cerrar el path
                ].join(' ');

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathData);
                path.setAttribute('fill', colors[index % colors.length]);
                path.setAttribute('stroke', '#111827'); // Borde oscuro
                path.setAttribute('stroke-width', '1');

                // Calcular posición del texto
                // Se coloca en la mitad del ángulo del gajo
                const textAngle = (cumulativePercent - sliceAngle / 2) * 2 * Math.PI;
                const textRadius = 60; // Distancia desde el centro
                const textX = Math.cos(textAngle) * textRadius;
                const textY = Math.sin(textAngle) * textRadius;
                
                // Rotar el texto para que apunte hacia el centro
                const textRotation = (textAngle * 180 / Math.PI);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', textX);
                text.setAttribute('y', textY);
                text.setAttribute('fill', 'white');
                text.setAttribute('font-size', players.length > 6 ? '8' : '10');
                text.setAttribute('font-weight', 'bold');
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.setAttribute('transform', `rotate(${textRotation}, ${textX}, ${textY})`);
                text.textContent = player;

                // Agrupar gajo y texto
                const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                group.appendChild(path);
                group.appendChild(text);
                wheelContainer.appendChild(group);
            });
        }

        // Lógica de Giro
        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            btnSpin.classList.remove('btn-spin');
            btnSpin.style.opacity = '0.5';

            // Decidir al azar quién "gana"
            const winningIndex = Math.floor(Math.random() * players.length);
            const winnerName = players[winningIndex];

            // Matemáticas del ángulo
            const sliceDegrees = 360 / players.length;
            // El ángulo base del ganador
            const winnerAngleBase = winningIndex * sliceDegrees;
            // Para que la flecha apunte al centro del gajo, restamos la mitad
            const centerOffset = sliceDegrees / 2;
            
            // Queremos que el ganador quede apuntando hacia ARRIBA (270 grados en nuestro SVG)
            // Calculamos cuánto hay que girar para alinear
            const targetAngle = 270 - (winnerAngleBase + centerOffset);
            
            // Añadir varias vueltas completas para el efecto de ruleta (ej. 5 a 8 vueltas)
            const extraSpins = (Math.floor(Math.random() * 4) + 5) * 360; 
            
            // Nueva rotación total
            currentRotation += extraSpins + targetAngle - (currentRotation % 360);

            // Aplicar rotación
            wheelContainer.style.transform = `rotate(${currentRotation}deg)`;

            // Esperar a que termine la animación (4 segundos según el CSS)
            setTimeout(() => {
                showResult(winnerName);
                isSpinning = false;
                btnSpin.classList.add('btn-spin');
                btnSpin.style.opacity = '1';
            }, 4000);
        }

        // Manejo del Modal
        function showResult(loserName) {
            document.getElementById('loser-name').innerText = loserName;
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('result-content');
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => content.classList.remove('scale-90'), 50);
        }

        function closeModal() {
            const modal = document.getElementById('result-modal');
            const content = document.getElementById('result-content');
            
            content.classList.add('scale-90');
            setTimeout(() => modal.classList.add('opacity-0', 'pointer-events-none'), 150);
        }

        // Inicializar
        drawWheel();
    </script>
</body>
</html>
