<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Envolviafood | Ruleta de la Cuenta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        #wheel-container { transition: transform 4s cubic-bezier(0.175, 0.885, 0.32, 1); transform-origin: center center; }
        @keyframes pulse-glow {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .btn-spin { animation: pulse-glow 2s infinite; }
    </style>
</head>
<body class="bg-gray-950 h-screen flex flex-col overflow-hidden text-white selection:bg-transparent">

    <div class="w-full max-w-md mx-auto bg-gray-900 h-full flex flex-col relative shadow-2xl border-x border-gray-800">
        <header class="p-4 flex justify-between items-center z-20 bg-gray-950/80 backdrop-blur-md border-b border-gray-800">
            <a href="qr_mesa.html" class="text-gray-400 hover:text-white transition p-2 rounded-full hover:bg-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <div class="flex flex-col items-center">
                <h1 class="text-xl font-black tracking-widest text-purple-400 uppercase">La Ruleta</h1>
            </div>
            <div class="text-xs font-bold text-gray-900 bg-purple-400 px-3 py-1 rounded-full">Mesa 4</div>
        </header>

        <main class="flex-1 relative flex flex-col items-center justify-center p-6 overflow-hidden bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gray-800 to-gray-950">
            <div class="absolute top-[15%] z-30 flex flex-col items-center drop-shadow-2xl filter">
                <div class="bg-white px-4 py-1 rounded-full text-gray-900 font-black text-xs uppercase tracking-widest shadow-lg border-2 border-gray-200 mb-1">
                    Ganador (o Perdedor)
                </div>
                <svg class="w-10 h-10 text-white fill-current drop-shadow-md" viewBox="0 0 24 24"><path d="M12 21l-9-13h18z" /></svg>
            </div>

            <div class="relative w-full max-w-[320px] aspect-square drop-shadow-[0_0_40px_rgba(0,0,0,0.8)] mt-8">
                <div class="absolute inset-0 bg-gray-900 rounded-full border-[8px] border-gray-800 shadow-inner"></div>
                <svg id="wheel-container" class="w-full h-full relative z-10" viewBox="-100 -100 200 200"></svg>
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-12 h-12 bg-gray-800 border-4 border-gray-600 rounded-full z-20 flex items-center justify-center">
                    <div class="w-4 h-4 bg-gray-500 rounded-full shadow-inner"></div>
                </div>
            </div>
        </main>

        <footer class="p-8 bg-gray-900 border-t border-gray-800 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] relative z-30">
            <button id="btn-spin" onclick="spinWheel()" class="w-full btn-spin bg-red-600 hover:bg-red-500 text-white font-black italic text-2xl tracking-widest py-5 rounded-2xl border-b-4 border-red-800 uppercase">
                Girar Ruleta
            </button>
        </footer>

        <div id="result-modal" class="absolute inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 px-6">
            <div class="bg-gray-900 border border-gray-700 rounded-3xl p-8 w-full text-center shadow-2xl transform scale-90 transition-transform duration-300" id="result-content">
                <span class="text-5xl mb-4 block">💸</span>
                <h2 class="text-xs text-gray-400 font-bold uppercase tracking-widest mb-1">Y la cuenta la paga...</h2>
                <h3 id="loser-name" class="text-4xl font-black text-white mb-6 uppercase italic">Nombre</h3>
                <button onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition">Aceptar el destino</button>
            </div>
        </div>
    </div>

    <script>
        const players = ["Mauricio", "Angi", "Compañero 1", "Compañero 2"];
        const colors = ["#ef4444", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899"];
        const wheelContainer = document.getElementById('wheel-container');
        const btnSpin = document.getElementById('btn-spin');
        
        let currentRotation = 0; let isSpinning = false;

        function getCoordinatesForPercent(percent) {
            return [Math.cos(2 * Math.PI * percent) * 100, Math.sin(2 * Math.PI * percent) * 100];
        }

        function drawWheel() {
            wheelContainer.innerHTML = '';
            const sliceAngle = 1 / players.length;
            let cumulativePercent = 0; 

            players.forEach((player, index) => {
                const [startX, startY] = getCoordinatesForPercent(cumulativePercent);
                cumulativePercent += sliceAngle;
                const [endX, endY] = getCoordinatesForPercent(cumulativePercent);
                const largeArcFlag = sliceAngle > 0.5 ? 1 : 0;

                const pathData = [`M ${startX} ${startY}`, `A 100 100 0 ${largeArcFlag} 1 ${endX} ${endY}`, `L 0 0`, `Z`].join(' ');
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', pathData); path.setAttribute('fill', colors[index % colors.length]); path.setAttribute('stroke', '#111827'); path.setAttribute('stroke-width', '1');

                const textAngle = (cumulativePercent - sliceAngle / 2) * 2 * Math.PI;
                const textX = Math.cos(textAngle) * 60; const textY = Math.sin(textAngle) * 60;
                
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', textX); text.setAttribute('y', textY); text.setAttribute('fill', 'white'); text.setAttribute('font-size', '10'); text.setAttribute('font-weight', 'bold'); text.setAttribute('text-anchor', 'middle'); text.setAttribute('transform', `rotate(${textAngle * 180 / Math.PI}, ${textX}, ${textY})`);
                text.textContent = player;

                const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                group.appendChild(path); group.appendChild(text); wheelContainer.appendChild(group);
            });
        }

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true; btnSpin.classList.remove('btn-spin'); btnSpin.style.opacity = '0.5';

            const winningIndex = Math.floor(Math.random() * players.length);
            const winnerName = players[winningIndex];
            const sliceDegrees = 360 / players.length;
            const targetAngle = 270 - (winningIndex * sliceDegrees + (sliceDegrees / 2));
            
            currentRotation += ((Math.floor(Math.random() * 4) + 5) * 360) + targetAngle - (currentRotation % 360);
            wheelContainer.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                document.getElementById('loser-name').innerText = winnerName;
                document.getElementById('result-modal').classList.remove('opacity-0', 'pointer-events-none');
                setTimeout(() => document.getElementById('result-content').classList.remove('scale-90'), 50);
                isSpinning = false; btnSpin.classList.add('btn-spin'); btnSpin.style.opacity = '1';
            }, 4000);
        }

        function closeModal() {
            document.getElementById('result-content').classList.add('scale-90');
            setTimeout(() => document.getElementById('result-modal').classList.add('opacity-0', 'pointer-events-none'), 150);
        }
        drawWheel();
    </script>
</body>
</html>
