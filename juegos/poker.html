<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Envolviafood | Poker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .casino-felt { background-color: #064e3b; background-image: radial-gradient(circle, #065f46 0%, #022c22 100%); }
    </style>
</head>
<body class="bg-gray-950 h-screen flex flex-col overflow-hidden text-white selection:bg-transparent">

    <div class="w-full max-w-md mx-auto bg-gray-900 h-full flex flex-col relative shadow-2xl border-x border-gray-800">
        
        <header class="p-4 flex justify-between items-center z-20 bg-gray-950/80 backdrop-blur-md border-b border-gray-800">
            <a href="qr_mesa.html" class="text-gray-400 hover:text-white transition p-2 rounded-full hover:bg-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <h1 class="text-xl font-black tracking-widest text-yellow-500 uppercase">Texas Hold'em</h1>
            <div class="text-xs font-bold text-gray-900 bg-yellow-500 px-3 py-1 rounded-full">Mesa 4</div>
        </header>

        <main class="flex-1 relative flex flex-col items-center justify-between p-4 casino-felt rounded-3xl m-2 border-4 border-amber-900/50 shadow-inner">
            <div class="flex flex-col items-center w-full relative z-10 mt-10">
                <div class="mb-4 flex flex-col items-center">
                    <span class="text-[10px] uppercase tracking-widest text-emerald-200">Bote Total</span>
                    <span id="pot-amount" class="font-black text-xl text-yellow-400 bg-black/60 px-4 py-1 rounded-full">$0.00</span>
                </div>
                <div id="community-cards" class="flex gap-1 h-24 justify-center items-center w-full px-2"></div>
            </div>
        </main>

        <footer class="bg-gray-950 border-t border-gray-800 rounded-t-3xl pt-2 pb-6 px-4">
            <div class="flex justify-between items-end mb-4 px-2">
                <div>
                    <p class="text-xs text-gray-500 font-semibold uppercase">Tu Saldo</p>
                    <p class="text-xl font-black text-yellow-500" id="player-balance">$50.00</p>
                </div>
                <p class="text-[10px] text-gray-500 font-semibold uppercase" id="game-status">Esperando tu acción...</p>
            </div>

            <div id="player-hand" class="flex justify-center -space-x-4 mb-6 relative"></div>

            <div class="grid grid-cols-3 gap-3">
                <button onclick="advanceStage()" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold py-3 rounded-xl border border-gray-700 shadow-sm text-xs uppercase">No Ir</button>
                <button onclick="checkOrCall()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl text-xs uppercase" id="lbl-call">Igualar</button>
                <button onclick="raise()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl text-xs uppercase">Subir</button>
            </div>
        </footer>
    </div>

    <script>
        const suits = [{icon: '♥', color: 'text-red-600'}, {icon: '♣', color: 'text-gray-900'}];
        let playerHand = [], communityCards = [], stage = 0, pot = 0, balance = 50.00;

        function createCardHTML(card) {
            return `<div class="w-[60px] h-[85px] bg-white rounded-lg border border-gray-300 shadow-xl flex flex-col justify-between p-1">
                        <div class="text-xs font-bold ${card.suit.color}">${card.value}</div>
                        <div class="text-3xl ${card.suit.color} self-center">${card.suit.icon}</div>
                    </div>`;
        }

        function updateUI() {
            document.getElementById('pot-amount').innerText = `$${pot.toFixed(2)}`;
            document.getElementById('player-balance').innerText = `$${balance.toFixed(2)}`;
        }

        function checkOrCall() { pot += 6; balance -= 2; advanceStage(); }
        function raise() { pot += 12; balance -= 4; advanceStage(); }

        function advanceStage() {
            stage++;
            const cc = document.getElementById('community-cards');
            if (stage === 1) cc.innerHTML = createCardHTML({suit: suits[0], value: 'A'}) + createCardHTML({suit: suits[1], value: 'K'}) + createCardHTML({suit: suits[0], value: '10'});
            else if (stage === 2) cc.innerHTML += createCardHTML({suit: suits[1], value: '5'});
            else if (stage === 3) cc.innerHTML += createCardHTML({suit: suits[0], value: 'J'});
            else if (stage === 4) { stage = 0; pot = 0; cc.innerHTML = ''; alert("Mano terminada"); }
            updateUI();
        }

        window.onload = () => {
            document.getElementById('player-hand').innerHTML = createCardHTML({suit: suits[0], value: 'A'}) + createCardHTML({suit: suits[0], value: 'K'});
            pot = 4; updateUI();
        };
    </script>
</body>
</html>
