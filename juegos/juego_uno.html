<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Envolviafood | UNO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        .hand-container { display: flex; overflow-x: auto; padding: 1rem; margin-left: 10px; }
        .card-in-hand { margin-left: -30px; transition: transform 0.2s, margin 0.2s; }
        .card-in-hand:first-child { margin-left: 0; }
        .card-in-hand:hover { transform: translateY(-15px) rotate(-2deg); margin-right: 15px; z-index: 50; }
        @keyframes playCard { 0% { transform: scale(1.2) translateY(50px); opacity: 0; } 100% { transform: scale(1) translateY(0) rotate(var(--rotation)); opacity: 1; } }
        .played-anim { animation: playCard 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-900 h-screen flex flex-col overflow-hidden text-white selection:bg-transparent">

    <div class="w-full max-w-md mx-auto bg-gray-950 h-full flex flex-col relative shadow-2xl border-x border-gray-800">
        <header class="p-4 flex justify-between items-center z-10 bg-gray-900/80 backdrop-blur-md border-b border-gray-800">
            <a href="qr_mesa.html" class="text-gray-400 hover:text-white transition p-2 rounded-full hover:bg-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <h1 class="text-2xl font-black italic tracking-tighter text-[#e50000]">UNO!</h1>
            <div class="text-xs font-bold text-gray-400 bg-gray-800 px-3 py-1 rounded-full">Mesa 4</div>
        </header>

        <main class="flex-1 relative flex flex-col items-center justify-center p-6 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gray-800 to-gray-950">
            <div class="absolute top-8 flex gap-[-10px] scale-75 opacity-70 pointer-events-none">
                <div class="w-16 h-24 bg-gray-900 border-2 border-gray-700 rounded-lg flex items-center justify-center"><span class="text-[#e50000] font-black italic text-xs transform -rotate-12">UNO</span></div>
            </div>
            
            <div class="flex items-center gap-6 mt-8">
                <button onclick="drawCard()" class="w-24 h-36 bg-gray-900 border-4 border-gray-700 rounded-xl flex items-center justify-center transform active:scale-95 transition relative">
                    <span class="text-[#e50000] font-black italic text-xl transform -rotate-12">UNO</span>
                </button>
                <div id="discard-pile" class="w-24 h-36 rounded-xl flex items-center justify-center relative"></div>
            </div>

            <button id="btn-gritar-uno" onclick="shoutUno()" class="absolute bottom-4 right-4 w-14 h-14 bg-[#e50000] text-white rounded-full font-black italic hidden items-center justify-center z-20">UNO!</button>
        </main>

        <footer class="h-48 bg-gray-900 border-t border-gray-800 relative z-20">
            <div class="p-2 flex justify-between items-center text-xs text-gray-400 font-semibold px-4 border-b border-gray-800">
                <span>Tu turno</span><span id="card-count">7 Cartas</span>
            </div>
            <div id="player-hand" class="hand-container h-full pt-4 pb-8"></div>
        </footer>

        <div id="game-toast" class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full text-sm font-bold opacity-0 transition-all z-50">Mensaje</div>
    </div>

    <script>
        const colorStyles = { 'red': 'bg-[#ff5555]', 'blue': 'bg-[#5555ff]', 'green': 'bg-[#55aa55]', 'yellow': 'bg-[#ffaa00]', 'black': 'bg-gray-900' };
        let deck = [], playerHand = [], discardPile = [];
        
        function buildDeck() {
            ['red', 'blue', 'green', 'yellow'].forEach(color => {
                ['1','2','3','4','5','6','7','8','9','⇄','+2'].forEach(value => { deck.push({ color, value, isWild: false }); });
            });
            for(let i=0; i<4; i++) deck.push({ color: 'black', value: 'WILD', isWild: true });
            deck.sort(() => Math.random() - 0.5);
        }

        function createCardHTML(card, isDiscard = false) {
            return `<div class="${isDiscard ? 'w-24 h-36' : 'w-20 h-32 card-in-hand cursor-pointer'} ${colorStyles[card.color]} rounded-xl border-[3px] border-white flex items-center justify-center ${isDiscard?'played-anim':''}">
                        <div class="bg-white rounded-[50%] w-12 h-20 flex items-center justify-center transform -rotate-12"><span class="text-${colorStyles[card.color].split('-')[1].replace(']','')} font-black text-2xl">${card.value}</span></div>
                    </div>`;
        }

        function renderGame() {
            const top = discardPile[discardPile.length - 1];
            document.getElementById('discard-pile').innerHTML = createCardHTML(top, true);
            const handEl = document.getElementById('player-hand'); handEl.innerHTML = '';
            
            playerHand.forEach((card, i) => {
                const div = document.createElement('div'); div.innerHTML = createCardHTML(card);
                const el = div.firstElementChild;
                if(card.color === top.color || card.value === top.value || card.isWild) {
                    el.onclick = () => playCard(i);
                } else el.classList.add('opacity-50');
                handEl.appendChild(el);
            });
            document.getElementById('card-count').innerText = `${playerHand.length} Cartas`;
        }

        function playCard(i) {
            const card = playerHand.splice(i, 1)[0];
            if(card.isWild) card.color = ['red','blue','green','yellow'][Math.floor(Math.random()*4)];
            discardPile.push(card);
            renderGame();
        }

        function drawCard() { playerHand.push(deck.pop()); renderGame(); }

        function initGame() {
            buildDeck();
            for(let i=0; i<7; i++) playerHand.push(deck.pop());
            let first = deck.pop(); while(first.isWild) { deck.unshift(first); first = deck.pop(); }
            discardPile.push(first);
            renderGame();
        }
        window.onload = initGame;
    </script>
</body>
</html>
