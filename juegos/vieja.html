<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, maximum-scale=1.0, user-scalable=no">
    <title>Envolviafood | La Vieja</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-950 h-screen flex flex-col overflow-hidden text-white selection:bg-transparent">

    <div class="w-full max-w-md mx-auto bg-gray-900 h-full flex flex-col relative shadow-2xl border-x border-gray-800">
        <header class="p-4 flex justify-between items-center z-20 bg-gray-950/80 backdrop-blur-md border-b border-gray-800">
            <a href="qr_mesa.html" class="text-gray-400 hover:text-white transition p-2 rounded-full hover:bg-gray-800">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            </a>
            <h1 class="text-2xl font-black tracking-widest text-white uppercase">La Vieja</h1>
            <div class="text-xs font-bold text-gray-900 bg-white px-3 py-1 rounded-full">Mesa 4</div>
        </header>

        <div class="text-center py-4">
            <span id="status-text" class="text-sm font-bold tracking-widest uppercase bg-gray-800 px-4 py-2 rounded-full text-blue-400 shadow-md">Turno de ❌</span>
        </div>

        <main class="flex-1 flex items-center justify-center p-6">
            <div class="grid grid-cols-3 gap-3 w-full max-w-[320px] aspect-square">
                <button onclick="makeMove(0)" id="cell-0" class="game-cell bg-gray-800 border-2 border-gray-700 rounded-2xl text-5xl flex items-center justify-center shadow-lg active:scale-95"></button>
                <button onclick="makeMove(1)" id="cell-1" class="game-cell bg-gray-800 border-2 border-gray-700 rounded-2xl text-5xl flex items-center justify-center shadow-lg active:scale-95"></button>
                <button onclick="makeMove(2)" id="cell-2" class="game-cell bg-gray-800 border-2 border-gray-700 rounded-2xl text-5xl flex items-center justify-center shadow-lg active:scale-95"></button>
                <button onclick="makeMove(3)" id="cell-3" class="game-cell bg-gray-800 border-2 border-gray-700 rounded-2xl text-5xl flex items-center justify-center shadow-lg active:scale-95"></button>
                <button onclick="makeMove(4)" id="cell-4" class="game-cell bg-gray-800 border-2 border-gray-700 rounded-2xl text-5xl flex items-center justify-center shadow-lg active:scale-95"></button>
                <button onclick="makeMove(5)" id="cell-5" class="game-cell bg-gray-800 border-2 border-gray-700 rounded-2xl text-5xl flex items-center justify-center shadow-lg active:scale-95"></button>
                <button onclick="makeMove(6)" id="cell-6" class="game-cell bg-gray-800 border-2 border-gray-700 rounded-2xl text-5xl flex items-center justify-center shadow-lg active:scale-95"></button>
                <button onclick="makeMove(7)" id="cell-7" class="game-cell bg-gray-800 border-2 border-gray-700 rounded-2xl text-5xl flex items-center justify-center shadow-lg active:scale-95"></button>
                <button onclick="makeMove(8)" id="cell-8" class="game-cell bg-gray-800 border-2 border-gray-700 rounded-2xl text-5xl flex items-center justify-center shadow-lg active:scale-95"></button>
            </div>
        </main>

        <footer class="p-6 pb-8">
            <button onclick="resetGame()" class="w-full bg-white text-gray-900 font-black italic tracking-widest py-4 rounded-xl shadow-[0_0_20px_rgba(255,255,255,0.2)]">REINICIAR</button>
        </footer>
    </div>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X", gameActive = true;
        const win = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];

        function makeMove(i) {
            if (board[i] || !gameActive) return;
            board[i] = currentPlayer;
            document.getElementById(`cell-${i}`).innerHTML = currentPlayer === "X" ? "❌" : "⭕";
            checkResult();
        }

        function checkResult() {
            let won = false;
            for (let i = 0; i < win.length; i++) {
                const [a, b, c] = win[i];
                if (board[a] && board[a] === board[b] && board[a] === board[c]) { won = true; break; }
            }
            if (won) {
                gameActive = false; document.getElementById('status-text').innerText = `¡GANA ${currentPlayer}!`;
            } else if (!board.includes("")) {
                gameActive = false; document.getElementById('status-text').innerText = "¡EMPATE!";
            } else {
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                document.getElementById('status-text').innerText = `Turno de ${currentPlayer === "X" ? "❌" : "⭕"}`;
            }
        }

        function resetGame() {
            board = ["", "", "", "", "", "", "", "", ""]; gameActive = true; currentPlayer = "X";
            document.querySelectorAll('.game-cell').forEach(c => c.innerHTML = "");
            document.getElementById('status-text').innerText = `Turno de ❌`;
        }
    </script>
</body>
</html>
