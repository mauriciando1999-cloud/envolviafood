<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envolviafood | Acceso a Empresas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" defer></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden border border-gray-100">
        
        <div class="bg-gray-900 px-8 py-8 text-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 16px 16px;"></div>
            <h1 class="text-3xl font-black text-white tracking-widest uppercase relative z-10">Envolvia<span class="text-blue-500">food</span></h1>
            <p class="text-gray-400 mt-2 text-sm font-medium relative z-10">Portal Administrativo</p>
        </div>

        <form id="loginForm" class="px-8 py-8 space-y-6">
            
            <div>
                <label for="email" class="block text-sm font-bold text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="empresa@correo.com"
                    class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-3 text-gray-700 outline-none transition">
            </div>

            <div>
                <label for="password" class="block text-sm font-bold text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="block w-full rounded-lg border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-3 text-gray-700 outline-none transition">
            </div>

            <div id="auth-error" class="hidden bg-red-50 border border-red-200 text-red-600 text-sm font-semibold p-3 rounded-lg text-center">
                Credenciales incorrectas. Intenta de nuevo.
            </div>

            <button type="submit" id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black uppercase tracking-widest py-3 px-4 rounded-xl transition duration-200 shadow-[0_4px_14px_rgba(37,99,235,0.4)] active:scale-95">
                Iniciar Sesión
            </button>
            
            <p class="text-xs text-center text-gray-400 font-medium mt-4">
                Si no tienes acceso, contacta a tu proveedor de software.
            </p>
        </form>
    </div>

</body>
</html>
