<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Librería de Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Tu script central -->
<script src="app.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envolviafood | Configuración Inicial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
        
        <div class="bg-gray-900 px-8 py-6 text-center">
            <h1 class="text-3xl font-bold text-white tracking-widest uppercase">Envolvia<span class="text-blue-500">food</span></h1>
            <p class="text-gray-400 mt-2 text-sm">Configura el entorno digital de tu restaurante</p>
        </div>

        <form action="#" method="POST" class="px-8 py-8 space-y-8" id="onboardingForm">
            
            <div>
                <h2 class="text-xl font-semibold text-gray-800 border-b pb-2 mb-4">Datos del Restaurante</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="restaurantName" class="block text-sm font-medium text-gray-700">Nombre del Local</label>
                        <input type="text" id="restaurantName" name="restaurantName" required 
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-700">
                    </div>
                    <div>
                        <label for="cuisineType" class="block text-sm font-medium text-gray-700">Tipo de Comida</label>
                        <select id="cuisineType" name="cuisineType" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-700">
                            <option value="pizzeria">Pizzería</option>
                            <option value="sushi">Sushi / Asiática</option>
                            <option value="fastfood">Comida Rápida</option>
                            <option value="autor">Cocina de Autor</option>
                            <option value="cafe">Cafetería / Panadería</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label for="email" class="block text-sm font-medium text-gray-700">Correo Electrónico de Contacto</label>
                        <input type="email" id="email" name="email" required 
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2 text-gray-700">
                    </div>
                </div>
            </div>

            <div>
                <h2 class="text-xl font-semibold text-gray-800 border-b pb-2 mb-4">Módulos a Activar</h2>
                <p class="text-sm text-gray-500 mb-4">Enciende las funciones que necesitas para operar. Podrás modificar esto más adelante.</p>
                
                <div class="space-y-4">
                    
                    <label class="flex items-center justify-between cursor-pointer p-3 rounded-lg border hover:bg-gray-50 transition">
                        <div>
                            <span class="block text-sm font-semibold text-gray-800">Gestión Interna y RRHH</span>
                            <span class="block text-xs text-gray-500">Control de personal, turnos y roles.</span>
                        </div>
                        <div class="relative">
                            <input type="checkbox" name="mod_interna" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </div>
                    </label>

                    <label class="flex items-center justify-between cursor-pointer p-3 rounded-lg border hover:bg-gray-50 transition">
                        <div>
                            <span class="block text-sm font-semibold text-gray-800">Control de Costos e Inventario</span>
                            <span class="block text-xs text-gray-500">Mermas, recetas estándar y stock en tiempo real.</span>
                        </div>
                        <div class="relative">
                            <input type="checkbox" name="mod_costos" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </div>
                    </label>

                    <label class="flex items-center justify-between cursor-pointer p-3 rounded-lg border hover:bg-gray-50 transition">
                        <div>
                            <span class="block text-sm font-semibold text-gray-800">Pedidos por Delivery</span>
                            <span class="block text-xs text-gray-500">Recepción de comandas de apps externas y propias.</span>
                        </div>
                        <div class="relative">
                            <input type="checkbox" name="mod_delivery" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </div>
                    </label>

                    <label class="flex items-center justify-between cursor-pointer p-3 rounded-lg border hover:bg-gray-50 transition">
                        <div>
                            <span class="block text-sm font-semibold text-gray-800">Gestión de Mesas (Salón)</span>
                            <span class="block text-xs text-gray-500">Mapa de mesas, cuentas separadas y atención de mesoneros.</span>
                        </div>
                        <div class="relative">
                            <input type="checkbox" name="mod_mesas" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </div>
                    </label>

                    <label class="flex items-center justify-between cursor-pointer p-3 rounded-lg border hover:bg-gray-50 transition">
                        <div>
                            <span class="block text-sm font-semibold text-gray-800">Pantalla de Cocina (KDS)</span>
                            <span class="block text-xs text-gray-500">Visualización digital de comandas para los cocineros.</span>
                        </div>
                        <div class="relative">
                            <input type="checkbox" name="mod_cocina" class="sr-only peer">
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </div>
                    </label>

                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md">
                    Crear mi entorno Envolviafood
                </button>
            </div>
        </form>
    </div>

</body>
<script>
    document.getElementById('onboardingForm').addEventListener('submit', function(e) {
        e.preventDefault(); // Evita que la página recargue inmediatamente
        
        // Capturar los valores de los suiches
        const config = {
            mod_interna: document.querySelector('input[name="mod_interna"]').checked,
            mod_costos: document.querySelector('input[name="mod_costos"]').checked,
            mod_delivery: document.querySelector('input[name="mod_delivery"]').checked,
            mod_mesas: document.querySelector('input[name="mod_mesas"]').checked,
            mod_cocina: document.querySelector('input[name="mod_cocina"]').checked
        };

        // Guardar en localStorage
        localStorage.setItem('envolviafood_config', JSON.stringify(config));
        
        // Redirigir al dashboard
        window.location.href = 'dashboard.html';
    });
</script>
</html>
