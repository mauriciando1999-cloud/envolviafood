<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envolviafood | Gestión de Mesas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="app.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Estilos específicos para el plano de mesas */
        #floor-plan {
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .restaurant-table {
            transition: transform 0.1s;
            user-select: none;
        }
        .restaurant-table.edit-mode {
            cursor: grab;
            border-style: dashed;
            border-width: 2px;
        }
        .restaurant-table.edit-mode:active {
            cursor: grabbing;
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .restaurant-table.view-mode {
            cursor: pointer;
        }
        .restaurant-table.view-mode:hover {
            transform: scale(1.05);
        }
        /* Colores de estado */
        .status-free { border-color: #22c55e; background-color: #dcfce7; color: #166534; }
        .status-occupied { border-color: #ef4444; background-color: #fee2e2; color: #991b1b; }
        .status-waiting { border-color: #eab308; background-color: #fef9c3; color: #854d0e; }
    </style>
    
    <script src="app.js" defer></script>
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-gray-800">

    <aside class="w-64 bg-gray-900 text-white flex flex-col hidden md:flex shadow-xl z-20 border-r border-gray-800 shrink-0">
        <div class="h-16 flex items-center justify-center border-b border-gray-800">
            <h1 class="text-2xl font-bold tracking-widest uppercase">Envolvia<span class="text-blue-500">food</span></h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto" id="sidebarMenu">
            </nav>
        <div class="p-4 border-t border-gray-800 bg-gray-900">
            <div class="flex items-center">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-sm font-bold shadow-inner">RT</div>
                <div class="ml-3 truncate">
                    <p class="text-sm font-medium text-white truncate">Restaurante Test</p>
                    <a href="index.html" class="text-xs text-gray-400 hover:text-blue-400 transition">Configuración</a>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 shrink-0 shadow-sm z-10">
            <h2 class="text-lg font-bold text-gray-800 flex items-center">
                <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                Control de Salón
            </h2>
            
            <div class="flex items-center gap-6">
                <div class="hidden md:flex gap-4 text-sm font-medium">
                    <span class="flex items-center"><div class="w-3 h-3 rounded-full bg-green-500 mr-1.5"></div> Libres: <span id="count-free" class="ml-1">0</span></span>
                    <span class="flex items-center"><div class="w-3 h-3 rounded-full bg-red-500 mr-1.5"></div> Ocupadas: <span id="count-occupied" class="ml-1">0</span></span>
                </div>
                
                <div class="w-px h-6 bg-gray-300 hidden md:block"></div>

                <label class="flex items-center cursor-pointer">
                    <span class="mr-3 text-sm font-semibold text-gray-700" id="edit-mode-label">Modo Visualización</span>
                    <div class="relative">
                        <input type="checkbox" id="toggle-edit-mode" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-purple-600"></div>
                    </div>
                </label>
                
                <button id="btn-add-table" class="hidden bg-purple-600 hover:bg-purple-700 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm transition items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Mesa
                </button>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            
            <div id="floor-plan" class="flex-1 relative overflow-auto shadow-inner bg-gray-50">
                </div>

            <div id="table-panel" class="w-80 bg-white border-l border-gray-200 shadow-2xl flex flex-col transform translate-x-full transition-transform duration-300 z-10 absolute right-0 top-0 bottom-0 md:relative md:translate-x-0 hidden">
                
                <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                    <h3 class="text-xl font-bold text-gray-800" id="panel-title">Mesa --</h3>
                    <button id="btn-close-panel" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <div class="p-4 flex-1 overflow-y-auto" id="panel-content">
                    <p class="text-gray-500 text-sm text-center mt-10">Selecciona una mesa para ver sus detalles.</p>
                </div>

                <div class="p-4 border-t border-gray-100 bg-gray-50 space-y-2" id="panel-actions" style="display: none;">
                    <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg shadow-sm transition">
                        Añadir Pedido
                    </button>
                    <button class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2.5 rounded-lg shadow-sm transition flex justify-center items-center gap-2" id="btn-pay">
                        Cobrar Cuenta
                    </button>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
